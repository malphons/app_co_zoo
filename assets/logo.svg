<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Convex set shape -->
  <polygon points="8,28 12,10 28,6 36,16 34,32 18,36" fill="url(#grad)" opacity="0.2" stroke="url(#grad)" stroke-width="1.5"/>
  <!-- Inner ellipse -->
  <ellipse cx="20" cy="20" rx="10" ry="7" fill="none" stroke="url(#grad)" stroke-width="1.2" transform="rotate(-15,20,20)" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2.5" fill="url(#grad)"/>
  <!-- Chord line -->
  <line x1="12" y1="14" x2="32" y2="28" stroke="url(#grad)" stroke-width="1.2" opacity="0.7"/>
</svg>
